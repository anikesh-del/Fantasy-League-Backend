<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#0f172a" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700" letter-spacing="1">Fantasy League Backend — Architecture</text>

  <!-- CLIENT -->
  <rect x="360" y="60" width="180" height="50" rx="8" fill="#1e40af" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="80" text-anchor="middle" fill="#bfdbfe" font-size="11" font-weight="600">CLIENT</text>
  <text x="450" y="98" text-anchor="middle" fill="#93c5fd" font-size="10">Postman / Browser / App</text>

  <!-- Arrow down -->
  <line x1="450" y1="110" x2="450" y2="138" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="445,138 450,148 455,138" fill="#475569"/>

  <!-- EXPRESS API -->
  <rect x="300" y="150" width="300" height="60" rx="8" fill="#065f46" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="174" text-anchor="middle" fill="#a7f3d0" font-size="12" font-weight="700">EXPRESS API</text>
  <text x="450" y="192" text-anchor="middle" fill="#6ee7b7" font-size="10">Auth · Fantasy · Points · Admin · Leaderboard</text>

  <!-- Middleware labels -->
  <rect x="130" y="158" width="150" height="44" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="205" y="176" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">MIDDLEWARE</text>
  <text x="205" y="192" text-anchor="middle" fill="#64748b" font-size="9.5">JWT Auth · Zod Validate · Rate Limit</text>
  <line x1="280" y1="180" x2="300" y2="180" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Arrow down from Express to DB row -->
  <line x1="450" y1="210" x2="450" y2="238" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="445,238 450,248 455,238" fill="#475569"/>

  <!-- POSTGRES -->
  <rect x="160" y="250" width="190" height="58" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="255" y="273" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="700">PostgreSQL</text>
  <text x="255" y="291" text-anchor="middle" fill="#93c5fd" font-size="9.5">users · fantasy_team · players · gameweeks</text>

  <!-- REDIS -->
  <rect x="550" y="250" width="190" height="58" rx="8" fill="#450a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="645" y="273" text-anchor="middle" fill="#fecaca" font-size="12" font-weight="700">Redis</text>
  <text x="645" y="291" text-anchor="middle" fill="#fca5a5" font-size="9.5">Cache (bootstrap · team · leaderboard)</text>

  <!-- Lines from Express to PG and Redis -->
  <line x1="380" y1="240" x2="290" y2="255" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="286,252 286,262 294,257" fill="#3b82f6"/>
  <line x1="520" y1="240" x2="610" y2="255" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="606,252 614,257 606,262" fill="#ef4444"/>

  <!-- Redis also to Sliding Window label -->
  <text x="645" y="325" text-anchor="middle" fill="#f87171" font-size="9" font-style="italic">Sliding Window Rate Limiter</text>

  <!-- BULLMQ -->
  <rect x="330" y="370" width="240" height="52" rx="8" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <text x="450" y="392" text-anchor="middle" fill="#c7d2fe" font-size="12" font-weight="700">BullMQ Queues</text>
  <text x="450" y="410" text-anchor="middle" fill="#a5b4fc" font-size="9.5">syncQueue · settlementQueue (backed by Redis)</text>

  <!-- Redis to BullMQ -->
  <line x1="645" y1="308" x2="645" y2="355" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="645" y1="355" x2="570" y2="375" stroke="#818cf8" stroke-width="1.5"/>
  <polygon points="566,371 566,381 574,376" fill="#818cf8"/>

  <!-- Express to BullMQ (settlement trigger) -->
  <line x1="450" y1="210" x2="450" y2="370" stroke="#818cf8" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="445,370 450,378 455,370" fill="#818cf8"/>

  <!-- WORKERS -->
  <rect x="130" y="468" width="190" height="52" rx="8" fill="#1c1917" stroke="#d97706" stroke-width="1.5"/>
  <text x="225" y="490" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="700">Sync Worker</text>
  <text x="225" y="507" text-anchor="middle" fill="#fcd34d" font-size="9.5">syncAll · syncCurrentGameweek</text>

  <rect x="580" y="468" width="190" height="52" rx="8" fill="#1c1917" stroke="#d97706" stroke-width="1.5"/>
  <text x="675" y="490" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="700">Settlement Worker</text>
  <text x="675" y="507" text-anchor="middle" fill="#fcd34d" font-size="9.5">calculatePoints · bulkInsert scores</text>

  <!-- BullMQ to Workers -->
  <line x1="380" y1="422" x2="270" y2="468" stroke="#d97706" stroke-width="1.5"/>
  <polygon points="266,464 266,474 274,469" fill="#d97706"/>
  <line x1="520" y1="422" x2="630" y2="468" stroke="#d97706" stroke-width="1.5"/>
  <polygon points="626,464 634,469 626,474" fill="#d97706"/>

  <!-- FPL API -->
  <rect x="130" y="558" width="190" height="44" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="225" y="578" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="700">FPL API (External)</text>
  <text x="225" y="594" text-anchor="middle" fill="#86efac" font-size="9.5">fantasy.premierleague.com</text>

  <!-- Sync Worker to FPL API -->
  <line x1="225" y1="520" x2="225" y2="558" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="220,558 225,566 230,558" fill="#22c55e"/>

  <!-- Settlement Worker back to Postgres -->
  <line x1="675" y1="520" x2="675" y2="545" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="675" y1="545" x2="300" y2="545" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="300" y1="545" x2="255" y2="308" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="250,310 255,300 260,310" fill="#3b82f6"/>

  <!-- Scheduler label -->
  <rect x="580" y="558" width="190" height="44" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="675" y="578" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Scheduler (BullMQ)</text>
  <text x="675" y="594" text-anchor="middle" fill="#64748b" font-size="9.5">Every 6h: syncAll + syncGW</text>
  <line x1="675" y1="520" x2="675" y2="558" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <rect x="20" y="558" width="95" height="52" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="67" y="574" text-anchor="middle" fill="#64748b" font-size="9" font-weight="600">LEGEND</text>
  <line x1="28" y1="585" x2="50" y2="585" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="56" y="588" fill="#64748b" font-size="8.5">DB read/write</text>
  <line x1="28" y1="597" x2="50" y2="597" stroke="#d97706" stroke-width="1.5"/>
  <text x="56" y="600" fill="#64748b" font-size="8.5">Queue/worker</text>
</svg>
